<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Campaign Manager</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary-color: #ec4899;
            /* Instagram-esque pink */
            --primary-hover: #db2777;
            --accent-color: #8b5cf6;
            /* Purple accent */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --glass-bg: rgba(30, 41, 59, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            backdrop-filter: blur(12px);
            background: var(--glass-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links button {
            background: none;
            border: none;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            margin-left: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-links button:hover {
            color: var(--primary-color);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            flex-grow: 1;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        /* Section Cards */
        .card {
            background: var(--surface-color);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card-header {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Calendar View */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-top: 1rem;
        }

        .calendar-day-header {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .calendar-day {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 8px;
            min-height: 80px;
            padding: 0.5rem;
            border: 1px solid transparent;
            position: relative;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .calendar-day:hover {
            border-color: var(--primary-color);
            background: rgba(15, 23, 42, 0.8);
        }

        .day-number {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .post-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary-color);
            margin-top: 0.25rem;
        }

        .post-indicator.posted {
            background: #10b981;
            /* Green */
        }

        .post-indicator.draft {
            background: #f59e0b;
            /* Orange */
        }

        /* Forms and Inputs */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input[type="text"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-main);
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(236, 72, 153, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
            width: 100%;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.5);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-ai {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
        }

        .btn-ai:hover {
            background: linear-gradient(135deg, #059669, #047857);
        }

        /* File Upload Area */
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 1rem;
            background: rgba(15, 23, 42, 0.3);
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: var(--primary-color);
            background: rgba(236, 72, 153, 0.05);
        }

        .upload-area p {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .upload-area svg {
            width: 48px;
            height: 48px;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        /* Post Preview List */
        .post-list {
            margin-top: 1rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .post-item {
            background: rgba(15, 23, 42, 0.5);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
        }

        .post-thumbnail {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            background: var(--bg-color);
            margin-right: 1rem;
            object-fit: cover;
            border: 1px solid var(--border-color);
        }

        .post-details h4 {
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }

        .post-details p {
            font-size: 0.8rem;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 0.25rem;
        }

        .status-draft {
            background: rgba(245, 158, 11, 0.2);
            color: #fcd34d;
            border: 1px solid rgba(245, 158, 11, 0.4);
        }

        .status-scheduled {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        /* Loader */
        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <h1>IG Campaign Manager</h1>
        <div class="nav-links">
            <button aria-label="Button">Seattle Culinary Tour</button>
            <button aria-label="Button">Settings</button>
        </div>
    </nav>

    <div class="container">
        <!-- Left Column: Calendar & Content Planner -->
        <div class="main-content">
            <div class="card" style="margin-bottom: 2rem;">
                <div class="card-header">
                    <span>Campaign Visualizer: Q1 Launch</span>
                    <select style="width: auto; padding: 0.25rem 0.5rem; font-size: 0.9rem;" id="monthSelect">
                        <option>March 2026</option>
                        <option>April 2026</option>
                        <option>May 2026</option>
                    </select>
                </div>

                <div class="calendar-grid">
                    <div class="calendar-day-header">Sun</div>
                    <div class="calendar-day-header">Mon</div>
                    <div class="calendar-day-header">Tue</div>
                    <div class="calendar-day-header">Wed</div>
                    <div class="calendar-day-header">Thu</div>
                    <div class="calendar-day-header">Fri</div>
                    <div class="calendar-day-header">Sat</div>

                    <!-- Days generated by JS -->
                </div>
            </div>

            <div class="card">
                <div class="card-header">Upcoming Posts</div>
                <div class="post-list" id="postList">
                    <!-- Post Items populated by JS -->
                </div>
            </div>
        </div>

        <!-- Right Column: Create/Edit Post -->
        <div class="sidebar">
            <div class="card">
                <div class="card-header">Create Post</div>

                <form id="postForm">
                    <div class="upload-area" id="dropZone">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                        </svg>
                        <h4>Drag & Drop Media</h4>
                        <p>Supports Images & Videos (max 50MB)</p>
                        <input type="file" id="fileInput" hidden accept="image/*,video/*">
                    </div>
                    <div id="mediaPreview" style="display: none; margin-bottom: 1rem; text-align: center;">
                        <img id="previewImg" src=""
                            style="max-width: 100%; border-radius: 8px; border: 1px solid var(--border-color);">
                    </div>

                    <div class="form-group">
                        <label for="topicInput">Topic / Theme</label>
                        <input type="text" id="topicInput" placeholder="e.g. Behind the scenes plating...">
                    </div>

                    <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                        <button type="button" class="btn btn-ai" id="btnGenCaption" style="flex: 1;" aria-label="Button">
                            ✨ Generate Text
                        </button>
                        <button type="button" class="btn btn-ai" id="btnGenImage" style="flex: 1;" aria-label="Button">
                            🎨 Generate Image
                        </button>
                    </div>

                    <div class="form-group">
                        <label for="captionInput">Caption & Hashtags</label>
                        <textarea id="captionInput" placeholder="Write your engaging caption here..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="scheduleDate">Schedule Date & Time</label>
                        <input type="datetime-local" id="scheduleDate">
                    </div>

                    <button type="button" class="btn btn-primary" id="btnSavePost" style="margin-bottom: 0.5rem;" aria-label="Button">
                        Schedule Post <div class="loader" id="saveLoader"></div>
                    </button>
                    <button type="button" class="btn btn-secondary" aria-label="Button">
                        Save as Draft
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Calendar logic (Mock)
        const calendarGrid = document.querySelector('.calendar-grid');
        for (let i = 1; i <= 31; i++) {
            const day = document.createElement('div');
            day.className = 'calendar-day';
            day.innerHTML = `<div class="day-number">${i}</div>`;

            // Randomly add some mock scheduled posts
            if (i === 5 || i === 12 || i === 18) {
                day.innerHTML += `<div class="post-indicator scheduled" title="Post scheduled"></div>`;
            } else if (i === 2) {
                day.innerHTML += `<div class="post-indicator posted" title="Posted successfully"></div>`;
            }

            calendarGrid.appendChild(day);
        }

        // Mock Post List
        const posts = [
            { id: 1, date: "Mar 5, 2026 - 12:00 PM", caption: "Dive into the culinary heartbeat of Seattle. Only 40 seats exist. Will you be at the table? #seattlesous", status: "scheduled", img: "https://picsum.photos/seed/seattle1/100/100" },
            { id: 2, date: "Mar 12, 2026 - 5:30 PM", caption: "Meet Chef Marcus. Pulling the strings behind the city's top plates. #chefslife #seattleeats", status: "draft", img: "https://picsum.photos/seed/seattle2/100/100" }
        ];

        const postList = document.getElementById('postList');
        posts.forEach(p => {
            const item = document.createElement('div');
            item.className = 'post-item';
            const statusClass = p.status === 'scheduled' ? 'status-scheduled' : 'status-draft';
            item.innerHTML = `
                <img src="${p.img}" class="post-thumbnail" alt="thumbnail">
                <div class="post-details">
                    <h4>${p.date}</h4>
                    <span class="status-badge ${statusClass}">${p.status.toUpperCase()}</span>
                    <p style="margin-top: 0.5rem;">${p.caption}</p>
                </div>
            `;
            postList.appendChild(item);
        });

        // Upload Logic
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const mediaPreview = document.getElementById('mediaPreview');
        const previewImg = document.getElementById('previewImg');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    mediaPreview.style.display = 'block';
                    dropZone.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        }

        // AI Generation Logic (Mock UI update)
        const btnGenCaption = document.getElementById('btnGenCaption');
        const btnGenImage = document.getElementById('btnGenImage');
        const captionInput = document.getElementById('captionInput');

        btnGenCaption.addEventListener('click', () => {
            const originalText = btnGenCaption.innerHTML;
            btnGenCaption.innerHTML = '✨ Generating...';
            btnGenCaption.disabled = true;

            setTimeout(() => {
                captionInput.value = "The art of the perfect sear. Nothing beats a Saturday night kitchen in the heart of Seattle taking fresh caught King Salmon to the next level. Seats are strictly limited to 40. Will you be holding a fork? 🍴✨\n\n#seattleeats #culinarytour #seattlefoodie #pnw dining #cheflife";
                btnGenCaption.innerHTML = originalText;
                btnGenCaption.disabled = false;
            }, 1500);
        });

        btnGenImage.addEventListener('click', () => {
            const originalText = btnGenImage.innerHTML;
            btnGenImage.innerHTML = '🎨 Generating...';
            btnGenImage.disabled = true;

            setTimeout(() => {
                // Use a reliable placeholder image URL
                previewImg.src = "https://picsum.photos/seed/seattle-food/500/500";
                mediaPreview.style.display = 'block';
                dropZone.style.display = 'none';
                btnGenImage.innerHTML = originalText;
                btnGenImage.disabled = false;
            }, 2000);
        });

        // Save Post Logic
        const btnSavePost = document.getElementById('btnSavePost');
        const saveLoader = document.getElementById('saveLoader');

        btnSavePost.addEventListener('click', () => {
            saveLoader.style.display = 'inline-block';
            btnSavePost.disabled = true;

            // Simulate saving to DB
            setTimeout(() => {
                saveLoader.style.display = 'none';
                btnSavePost.disabled = false;
                alert('Post scheduled successfully and saved to Database!');
                // Reset form
                document.getElementById('postForm').reset();
                mediaPreview.style.display = 'none';
                dropZone.style.display = 'block';
            }, 1000);
        });
    </script>
</body>

</html>
